<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JobBot — matched jobs</title>
<style>
  :root {
    --bg: #0f1420; --card: #171d2b; --line: #262e40; --text: #e7ebf3;
    --muted: #9aa4b8; --accent: #4c8dff; --good: #3fb950; --chip: #223052;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    padding: 22px 20px 14px; max-width: 900px; margin: 0 auto;
  }
  h1 { margin: 0; font-size: 22px; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .controls {
    max-width: 900px; margin: 0 auto; padding: 0 20px 14px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  input, select {
    background: var(--card); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 9px 12px; font-size: 14px; outline: none;
  }
  input#q { flex: 1; min-width: 180px; }
  input#q:focus, select:focus { border-color: var(--accent); }
  main { max-width: 900px; margin: 0 auto; padding: 0 20px 40px; }
  .job {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .job a.title {
    color: var(--accent); font-size: 16px; font-weight: 600; text-decoration: none;
  }
  .job a.title:hover { text-decoration: underline; }
  .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .chips { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    background: var(--chip); color: #cde0ff; font-size: 11px;
    padding: 3px 8px; border-radius: 20px;
  }
  .score {
    display: inline-block; background: rgba(63,185,80,.15); color: var(--good);
    font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 6px;
  }
  .src {
    text-transform: capitalize; background: #1d2740; color: #a9b6d6;
    font-size: 11px; padding: 2px 8px; border-radius: 6px;
  }
  .empty { color: var(--muted); text-align: center; padding: 60px 0; }
  footer { max-width: 900px; margin: 0 auto; padding: 10px 20px 30px;
    color: #5c6784; font-size: 11px; }
</style>
</head>
<body>
  <header>
    <h1>🤖 JobBot</h1>
    <div class="sub" id="summary">Loading matched jobs…</div>
  </header>

  <div class="controls">
    <input id="q" type="search" placeholder="Search title, company, skill…" />
    <select id="source"><option value="">All sources</option></select>
    <select id="sort">
      <option value="score">Sort: best match</option>
      <option value="new">Sort: newest</option>
    </select>
  </div>

  <main id="list"><div class="empty">Loading…</div></main>
  <footer id="foot"></footer>

<script>
let JOBS = [];

async function load() {
  try {
    // cache-bust so the page always shows the latest run
    const res = await fetch('jobs.json?t=' + Date.now());
    const data = await res.json();
    JOBS = data.jobs || [];
    const when = data.generated_at ? new Date(data.generated_at).toLocaleString() : '';
    document.getElementById('summary').textContent =
      `${data.count} matched job${data.count === 1 ? '' : 's'} · updated ${when}`;
    document.getElementById('foot').textContent =
      'Auto-generated by your self-hosted JobBot. Tune matches in config.yaml.';
    // populate source filter
    const sources = [...new Set(JOBS.map(j => j.source))].sort();
    const sel = document.getElementById('source');
    sources.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s.charAt(0).toUpperCase() + s.slice(1);
      sel.appendChild(o);
    });
    render();
  } catch (e) {
    document.getElementById('list').innerHTML =
      '<div class="empty">No jobs file yet. Run JobBot once to generate <code>jobs.json</code>.</div>';
  }
}

function render() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  const src = document.getElementById('source').value;
  const sort = document.getElementById('sort').value;

  let jobs = JOBS.filter(j => {
    if (src && j.source !== src) return false;
    if (!q) return true;
    const hay = (j.title + ' ' + j.company + ' ' + j.location + ' ' +
      (j.matched_skills || []).join(' ') + ' ' + (j.tags || []).join(' ')).toLowerCase();
    return hay.includes(q);
  });

  jobs.sort((a, b) => sort === 'new'
    ? (new Date(b.posted_at || 0)) - (new Date(a.posted_at || 0))
    : (b.score - a.score));

  const list = document.getElementById('list');
  if (!jobs.length) { list.innerHTML = '<div class="empty">No jobs match your filter.</div>'; return; }

  list.innerHTML = jobs.map(j => {
    const chips = (j.matched_skills || []).map(s => `<span class="chip">${esc(s)}</span>`).join('');
    const age = (j.age_days != null) ? `${Math.round(j.age_days)}d ago` : '';
    return `<div class="job">
      <a class="title" href="${esc(j.url)}" target="_blank" rel="noopener">${esc(j.title)}</a>
      <div class="meta">
        <span class="score">match ${j.score}</span>
        ${esc(j.company) || 'Unknown company'} · ${esc(j.location) || 'Remote'} ·
        <span class="src">${esc(j.source)}</span> ${age}
      </div>
      <div class="chips">${chips}</div>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

['q','source','sort'].forEach(id =>
  document.getElementById(id).addEventListener('input', render));
load();
</script>
</body>
</html>
