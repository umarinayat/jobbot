# ============================================================================
#  JobBot configuration
#  Edit this file to tune what counts as a "matching" job. No code changes
#  needed. After editing, commit & push (or just re-run locally).
# ============================================================================

# --- Which sources to pull from --------------------------------------------
sources:
  remotive: true
  arbeitnow: true
  jobicy: true
  remoteok: true
  rozee: true          # Pakistan-local (scraped, best-effort)

# --- What you're looking for ------------------------------------------------
# A job must match at least ONE role keyword to be considered at all.
role_keywords:
  - software engineer
  - software developer
  - full stack
  - full-stack
  - fullstack
  - frontend
  - front end
  - front-end
  - backend
  - back end
  - back-end
  - web developer
  - react developer
  - node developer
  - python developer
  - mern
  - mevn

# Skills add to a job's score. Higher score = ranked higher.
skills:
  react: 3
  "react.js": 3
  node: 3
  "node.js": 3
  typescript: 3
  javascript: 2
  python: 3
  vue: 2
  "vue.js": 2
  angular: 2
  "next.js": 2
  nextjs: 2
  express: 2
  flask: 2
  fastapi: 1
  mongodb: 2
  mysql: 2
  postgres: 1
  tailwind: 1
  langchain: 3
  llm: 2
  "ai": 1
  rag: 2
  socket.io: 1
  azure: 1

# A job needs at least this total skill score to be emailed.
min_score: 4

# ============================================================================
#  LOCATION RULES  (this is what controls the "remote anywhere" behaviour)
# ============================================================================
# The logic, in order:
#   1. If the location mentions Pakistan / a Pakistani city  -> KEEP.
#   2. If the job is on-site and NOT in Pakistan             -> DROP.
#   3. If a remote job's location is worldwide/global, or a
#      region that includes Pakistan (Asia / APAC)           -> KEEP.
#   4. If a remote job is restricted to another country
#      (USA, Brazil, Europe, ...)                            -> DROP.
#   5. A remote job with a generic/blank location ("Remote") -> KEEP only if
#      keep_generic_remote is true.
#
# So a "remote - USA only" or "remote - Brazil" job is dropped, while
# "remote - Worldwide", "remote - Anywhere", "remote - Asia", or a Pakistan
# role is kept.

local_terms:
  - pakistan
  - lahore
  - karachi
  - islamabad
  - rawalpindi

worldwide_terms:
  - worldwide
  - anywhere
  - global
  - any location
  - fully remote

include_regions:
  - asia
  - apac
  - asia pacific
  - asia-pacific
  - south asia

# Remote jobs restricted to any of these (with no worldwide/Pakistan term) are
# dropped. Add or remove countries/regions to taste.
restricted_terms:
  - usa
  - united states
  - u.s.
  - us only
  - us-based
  - us based
  - canada
  - brazil
  - mexico
  - argentina
  - colombia
  - latam
  - latin america
  - north america
  - emea
  - europe
  - european
  - uk
  - united kingdom
  - ireland
  - germany
  - france
  - spain
  - portugal
  - netherlands
  - poland
  - romania
  - ukraine
  - india
  - philippines
  - indonesia
  - vietnam
  - australia
  - new zealand
  - uae
  - united arab emirates
  - egypt
  - nigeria
  - south africa

# Keep remote jobs whose location is generic/unspecified (just "Remote")?
# true  = more results (some may still be geo-restricted in the fine print)
# false = stricter; only keep jobs explicitly worldwide / Asia / Pakistan
keep_generic_remote: true

# --- Hard exclusions --------------------------------------------------------
negative_keywords:
  - unpaid
  - commission only
  - commission-only
  - wordpress developer
  - php developer
  - salesforce
  - internship        # remove this line if you DO want internships

# --- Freshness --------------------------------------------------------------
max_age_days: 14

# --- Rozee.pk search terms (Pakistan scraper) -------------------------------
rozee_queries:
  - software engineer
  - full stack developer
  - react developer
